# General settings
blockExoticSubdeps: true
engineStrict: true
minimumReleaseAge: 7200 # 5 days
packageManagerStrictVersion: true
strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 129600 # 90 days
verifyDepsBeforeRun: error

allowBuilds:
  "@biomejs/biome": true
  "core-js": false
  "core-js-pure": false
  "esbuild": true
  "unrs-resolver": false

# Workspace

packages:
  - packages/*
  - demos/*
  - docs-website

catalogs:
  # Shared = aligned between packages and demos
  # (There are some dependencies in common between packages/demos which are not aligned)
  shared:
    '@testing-library/jest-dom': 6.9.1
    '@testing-library/react': 16.3.2
    '@vitest/coverage-v8': 4.1.2
    '@vitest/ui': 4.1.2
    vitest: 4.1.2
  # Packages use (mostly) up-to-date dependencies and devDependencies
  packages:
    '@arethetypeswrong/cli': 0.18.2
    '@size-limit/esbuild': 12.0.1
    '@size-limit/esbuild-why': 12.0.1
    '@size-limit/file': 12.0.1
    '@types/node': 24.10.9
    '@types/react': 19.2.14
    '@types/react-dom': 19.2.3
    publint: 0.3.18
    react-dom: 19.2.4
    react: 19.2.4
    size-limit: 12.0.1
    tsdown: 0.21.7
    typescript: 6.0.2
  # Demo apps sometimes use older dependencies and devDependencies
  demos:
    '@types/node': 24.10.9
    '@types/react': 19.2.14
    '@types/react-dom': 19.2.3
    react-dom: 19.2.4
    react: 19.2.4
    source-map-explorer: 2.5.3
    typescript: 5.4.5
    vite: 8.0.5

  # Library-specific catalogs help with isolated testing:
  # these are generally not used for normal dev
  react16:
    '@types/react': ^16.9.0
    '@types/react-dom': ^16.9.0
    react: ^16.9.0
    react-dom: ^16.9.0
  react17:
    '@types/react': ^17.0.0
    '@types/react-dom': ^17.0.0
    react: ^17.0.2
    react-dom: ^17.0.2
  react18:
    '@types/react': ^18.0.0
    '@types/react-dom': ^18.0.0
    react: ^18.2.0
    react-dom: ^18.2.0
  react19:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.4
    react-dom: ^19.2.4
  typescriptLTS:
    # https://github.com/DefinitelyTyped/DefinitelyTyped#support-window
    typescript: 5.4.x
