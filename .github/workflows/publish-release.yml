name: Publish Release

on: workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  publish-npm:
    name: Publish (stage) to NPM
    runs-on: ubuntu-latest
    # Only run for the original repo, and only the default branch, and only if it's properly protected
    if: |
      (! github.event.push.head.repo.fork)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && github.ref_protected == true
    permissions:
      contents: read # Required to clone the repository when this template is used in a private repo.
      id-token: write # Required for npm trusted publishing via GitHub OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/reusable-workflows/setup-repo
        with:
          node-version: nvmrc
          enable-package-manager-cache: false

      - name: Stage packages for npm release
        shell: bash
        run: |
          pnpm run release:stage > stage-results.json

      - name: Upload staged release metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: staged-release-metadata
          path: stage-results.json

      - name: Summarize staged releases
        shell: bash
        run: |
          {
            echo '## Staged releases'
            echo ''
            echo 'Approval stays manual. Use the stage IDs below with `pnpm stage approve <stage-id>` from a trusted local environment.'
            echo ''
            echo '```json'
            cat stage-results.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
