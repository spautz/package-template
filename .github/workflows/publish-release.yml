name: Publish Release

on: workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    # Only run for the original repo, and only the default branch, and only if it's properly protected
    if: |
      (! github.event.push.head.repo.fork)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && github.ref_protected == true
    permissions:
      contents: read # Required to clone the repository when this template is used in a private repo.
      id-token: write # Required for npm trusted publishing via GitHub OIDC.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/reusable-workflows/setup-repo
        with:
          node-version: nvmrc
          enable-package-manager-cache: false

      - name: Pack and verify tarballs
        run: |
          pnpm -r --filter "./packages/*" exec pnpm pack --out package-%v.tgz

      - name: Stage packages to NPM
        id: stage-release
        run: |
          set -o pipefail
          mkdir -p .tmp
          pnpm run --silent release:stage | tee .tmp/staged-release.json

          stage_ids="$(jq -r '.. | .stageId? // .stageID? // .stage_id? // empty' .tmp/staged-release.json | sort -u)"
          [ -n "$stage_ids" ] || { echo 'Failed to extract any stage IDs from pnpm output.'; exit 1; }

          {
            echo 'stage_ids<<EOF'
            printf '%s\n' "$stage_ids"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Summarize staged releases
        env:
          STAGE_IDS: ${{ steps.stage-release.outputs.stage_ids }}
        run: |
          {
            echo '## Staged releases'
            echo
            echo 'Approve these stages manually on npm, then run the Verify Live Release workflow.'
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r stage_id; do
            [ -n "$stage_id" ] || continue
            echo "- \`$stage_id\`" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$STAGE_IDS"
