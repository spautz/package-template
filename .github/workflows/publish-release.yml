name: Publish Release

on: workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    # Only run for the original repo, and only the default branch, and only if it's properly protected
    if: |
      (! github.event.push.head.repo.fork)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && github.ref_protected == true
    strategy:
      matrix:
        package-name: [basic-library-template, react-library-template ]
    permissions:
      contents: read # Required to clone the repository when this template is used in a private repo.
      id-token: write # Required for npm trusted publishing via GitHub OIDC.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/reusable-workflows/setup-repo
        with:
          node-version: nvmrc
          enable-package-manager-cache: false

      - name: Publish to NPM
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
        working-directory: packages/${{ matrix.package-name }}
        run: |
          pnpm pack --out "package-$PACKAGE_NAME-%v.tgz"
          npm publish --provenance --tag next "package-$PACKAGE_NAME"*.tgz

      - name: Verify published provenance
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
        run: |
          mkdir verify-publish
          cd verify-publish
          npm init -y
          npm install "$PACKAGE_NAME@next"
          npm audit signatures --json --include-attestations
