name: Prepare Release

on: workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # pnpm doesn't like the package & branch changes that happen when preparing a release,
  # and `verifyDepsBeforeRun` causes failures. So we'll disable the hooks that activate pnpm.
  HUSKY: 0

jobs:
  prepare-release-pr:
    name: Prepare PR for release
    runs-on: ubuntu-latest
    # Only run in non-fork repos, on protected default branches.
    if: |
      (! github.event.repository.fork)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && github.ref_protected
    permissions:
      contents: write # Required to push the release-prep branch back to the repository.
      pull-requests: write # Required to create or update the automated release PR.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/reusable-workflows/setup-repo
        with:
          node-version: nvmrc
          enable-package-manager-cache: false

      - name: Prepare release
        run: pnpm run release:prepare

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e00cb83a68c1158b29afc5217dd0582cada6d172 # v4.4.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11 # zizmor: ignore[superfluous-actions] clearer and lower-maintenance than equivalent gh shell logic
        with:
          branch: prepare-release
          committer: Steven Pautz (Github Actions) <spautz@gmail.com>
          commit-message: Prepare release (automated)
          title: Prepare release (automated)
          delete-branch: true
          token: ${{ secrets.PAT }}

      - name: Check outputs
        if: ${{ steps.cpr.outputs.pull-request-number }}
        env:
          PULL_REQUEST_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PULL_REQUEST_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          echo "Pull Request Number - $PULL_REQUEST_NUMBER"
          echo "Pull Request URL - $PULL_REQUEST_URL"
