name: Per-Package Code Coverage

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  package-test-coverage:
    name: Per-package code coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run in non-fork repos, on protected default branches.
    if: |
      (! github.event.repository.fork)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && github.ref_protected
    strategy:
      matrix:
        package-name: [basic-library-template, react-library-template]

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/reusable-workflows/setup-repo
        with:
          node-version: nvmrc

      - name: Run package tests
        working-directory: packages/${{ matrix.package-name }}
        run: pnpm exec turbo run test:ci

      - name: Report package test coverage to coveralls.io
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ github.token }}
          path-to-lcov: packages/${{ matrix.package-name }}/coverage/lcov.info
          base-path: packages/${{ matrix.package-name }}
          git-branch: x-cov-${{ matrix.package-name }}
          fail-on-error: false
