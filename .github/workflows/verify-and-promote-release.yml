name: Verify and Promote Release

on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: npm dist-tag to verify
        required: true
        default: next
      promote-to-tag:
        description: npm dist-tag to promote to; blank or same as npm-tag skips promotion
        required: false
        default: latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify-and-promote-release:
    name: Verify and promote npm release
    runs-on: ubuntu-latest
    # Only run in non-fork repos, on protected default branches.
    if: |
      (! github.event.repository.fork)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && github.ref_protected
    permissions:
      contents: read
    env:
      NPM_TAG: ${{ inputs['npm-tag'] }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/reusable-workflows/setup-repo
        with:
          node-version: nvmrc
          enable-package-manager-cache: false

      - name: Verify live packages
        run: |
          for dir in packages/*; do
            [ -d "$dir" ] || continue

            is_private="$(node -p "require('./$dir/package.json').private === true ? 'true' : 'false'")"
            [ "$is_private" != "true" ] || continue

            package_name="$(node -p "require('./$dir/package.json').name")"
            expected_version="$(node -p "require('./$dir/package.json').version")"
            actual_version="$(pnpm view "${package_name}@${NPM_TAG}" version)"

            if [ "$actual_version" != "$expected_version" ]; then
              echo "Expected ${package_name}@${NPM_TAG} to resolve to ${expected_version}, but got ${actual_version}."
              exit 1
            fi

            temp_dir="$(mktemp -d)"

            (
              cd "$temp_dir"
              # npm is required here for --include-attestations; pnpm audit signatures verifies signatures only.
              npm init -y >/dev/null 2>&1
              npm install "${package_name}@${NPM_TAG}" --ignore-scripts
              npm audit signatures --json --include-attestations
            )

            rm -rf "$temp_dir"
          done

      - name: Promote dist-tags
        if: ${{ inputs['promote-to-tag'] != '' && inputs['promote-to-tag'] != inputs['npm-tag'] }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          PROMOTE_TO_TAG: ${{ inputs['promote-to-tag'] }}
        run: |
          [ -n "$NODE_AUTH_TOKEN" ] || { echo 'NPM_PUBLISH_TOKEN is required.'; exit 1; }

          for dir in packages/*; do
            [ -d "$dir" ] || continue

            is_private="$(node -p "require('./$dir/package.json').private === true ? 'true' : 'false'")"
            [ "$is_private" != "true" ] || continue

            package_name="$(node -p "require('./$dir/package.json').name")"
            expected_version="$(node -p "require('./$dir/package.json').version")"
            package_spec="${package_name}@${expected_version}"

            pnpm dist-tag add "$package_spec" "$PROMOTE_TO_TAG"
            actual_version="$(pnpm view "${package_name}@${PROMOTE_TO_TAG}" version)"

            if [ "$actual_version" != "$expected_version" ]; then
              echo "Expected ${package_name}@${PROMOTE_TO_TAG} to resolve to ${expected_version}, but got ${actual_version}."
              exit 1
            fi
          done
